<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game Hub Arena</title>
    <style>
      :root {
        --bg-color: #0f172a;
        --board-bg: #1e293b;
        --accent-x: #00f5ff;
        --accent-o: #ff00ff;
        --accent-gold: #ffcc00;
        --text-color: #f8fafc;
        --ui-dim: #64748b;
        --btn-bg: #334155;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        user-select: none;
        overflow: hidden;
      }

      /* --- SCREENS --- */
      .screen {
        display: none;
        width: 100%;
        height: 100%;
        position: relative;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        animation: fadeIn 0.4s ease;
      }
      .screen.active {
        display: flex;
      }

      /* --- LOGIN SCREEN --- */
      .login-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
      }
      .login-title {
        font-size: 2rem;
        font-weight: 800;
        letter-spacing: 1px;
      }
      .login-input {
        padding: 15px;
        width: 300px;
        background: var(--board-bg);
        border: 2px solid var(--ui-dim);
        border-radius: 15px;
        color: #fff;
        font-size: 1.2rem;
        outline: none;
        text-align: center;
      }
      .login-input:focus {
        border-color: var(--accent-x);
      }
      .login-btn {
        padding: 15px 50px;
        font-size: 1.2rem;
        background: linear-gradient(135deg, var(--accent-x), var(--accent-o));
        border: none;
        border-radius: 30px;
        color: #000;
        font-weight: 800;
        cursor: pointer;
      }

      /* --- MENUS --- */
      .menu-title {
        font-size: 2.5rem;
        font-weight: 800;
        letter-spacing: 2px;
        background: linear-gradient(to right, var(--accent-x), var(--accent-o));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 20px;
      }
      .menu-section {
        background: var(--board-bg);
        padding: 20px;
        border-radius: 20px;
        width: 340px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        border: 1px solid rgba(255, 255, 255, 0.05);
        margin-bottom: 15px;
      }
      .menu-label {
        font-size: 0.85rem;
        color: var(--ui-dim);
        margin-bottom: 12px;
        text-transform: uppercase;
        font-weight: bold;
      }
      .btn-group {
        display: flex;
        gap: 10px;
        justify-content: center;
      }

      .btn-option {
        flex: 1;
        padding: 12px;
        background: var(--btn-bg);
        border: 2px solid transparent;
        border-radius: 10px;
        color: var(--text-color);
        cursor: pointer;
        font-weight: 600;
        transition: all 0.2s;
        font-size: 0.95rem;
      }
      .btn-option:hover {
        background: #475569;
      }
      .btn-option.selected {
        border-color: var(--accent-x);
        background: rgba(0, 245, 255, 0.15);
        color: #fff;
      }
      .btn-option.selected.o-type {
        border-color: var(--accent-o);
        background: rgba(255, 0, 255, 0.15);
      }

      .start-btn {
        padding: 15px 60px;
        font-size: 1.2rem;
        background: linear-gradient(135deg, var(--accent-x), var(--accent-o));
        border: none;
        border-radius: 30px;
        color: #000;
        font-weight: 800;
        cursor: pointer;
        transition: transform 0.2s;
        margin-top: 10px;
      }
      .start-btn:hover {
        transform: translateY(-3px);
      }

      /* --- LEADERBOARD --- */
      .lb-container {
        width: 340px;
        max-height: 300px;
        overflow-y: auto;
        background: #0f172a;
        border-radius: 12px;
        padding: 10px;
      }
      .lb-row {
        display: flex;
        justify-content: space-between;
        padding: 8px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }
      .lb-row:last-child {
        border-bottom: none;
      }
      .lb-rank {
        width: 30px;
        font-weight: bold;
        color: var(--ui-dim);
      }
      .lb-name {
        flex: 1;
        margin-left: 10px;
      }
      .lb-score {
        font-weight: bold;
        color: var(--accent-gold);
      }
      .nav-btn {
        padding: 10px 30px;
        background: transparent;
        border: 1px solid var(--ui-dim);
        color: var(--ui-dim);
        border-radius: 25px;
        cursor: pointer;
        margin-top: 15px;
      }

      /* --- GAME UI --- */
      .top-btn {
        position: absolute;
        top: 20px;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: var(--text-color);
        padding: 8px 20px;
        border-radius: 20px;
        cursor: pointer;
        font-weight: 500;
        font-size: 0.9rem;
        z-index: 10;
      }
      .top-btn:hover {
        background: rgba(255, 255, 255, 0.2);
      }
      .back-btn {
        left: 20px;
      }
      .restart-btn {
        right: 20px;
      }

      .timer-section {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 340px;
        margin-bottom: 15px;
      }
      .timer-display {
        font-size: 3rem;
        font-weight: 700;
        line-height: 1;
        margin-bottom: 5px;
      }
      .timer-display.warning {
        color: #ef4444;
        animation: pulse 1s infinite;
      }
      .timer-track {
        width: 100%;
        height: 6px;
        background: var(--btn-bg);
        border-radius: 3px;
        overflow: hidden;
      }
      .timer-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--accent-x), var(--accent-o));
        width: 100%;
        transition: width 1s linear;
      }

      .status-bar {
        display: flex;
        justify-content: space-between;
        width: 340px;
        margin-bottom: 20px;
        background: var(--board-bg);
        padding: 12px 20px;
        border-radius: 16px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
      }
      .player-info {
        text-align: center;
        flex: 1;
        transition: all 0.3s;
        opacity: 0.5;
        position: relative;
      }
      .player-info:first-child {
        border-right: 1px solid rgba(255, 255, 255, 0.1);
      }
      .player-info.active {
        opacity: 1;
      }
      .p-name {
        font-weight: 600;
        font-size: 0.9rem;
        letter-spacing: 1px;
      }
      .p-hand {
        font-size: 0.75rem;
        color: var(--ui-dim);
        margin-top: 4px;
      }
      .player-info.active .p-name {
        text-shadow: 0 0 10px currentColor;
      }

      .board {
        display: grid;
        grid-template-columns: repeat(3, 100px);
        grid-template-rows: repeat(3, 100px);
        gap: 12px;
        background: var(--board-bg);
        padding: 12px;
        border-radius: 20px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
      }

      .cell {
        background: var(--bg-color);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 3.5rem;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.15s ease-out;
        border: 2px solid transparent;
      }
      .cell:hover {
        background: #1e293b;
        transform: scale(1.02);
      }

      .cell.x-mark {
        color: var(--accent-x);
        text-shadow: 0 0 20px var(--accent-x);
      }
      .cell.o-mark {
        color: var(--accent-o);
        text-shadow: 0 0 20px var(--accent-o);
      }

      .cell.oldest-piece {
        border: 2px dashed var(--accent-gold);
        box-shadow: 0 0 15px rgba(255, 204, 0, 0.3);
        animation: pulseOld 1.5s infinite;
      }
      .cell.selected-piece {
        border: 2px solid #fff;
        background: rgba(255, 255, 255, 0.1);
      }
      .cell.valid-move {
        border: 2px solid var(--accent-x);
        background: rgba(0, 245, 255, 0.1);
      }

      .message {
        margin-top: 25px;
        font-size: 1.1rem;
        height: 20px;
        color: var(--ui-dim);
        letter-spacing: 0.5px;
        font-weight: 500;
      }

      @keyframes pulseOld {
        0% {
          box-shadow: 0 0 5px var(--accent-gold);
        }
        50% {
          box-shadow: 0 0 20px var(--accent-gold);
        }
        100% {
          box-shadow: 0 0 5px var(--accent-gold);
        }
      }
      @keyframes pulse {
        50% {
          opacity: 0.6;
        }
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <!-- SCREEN 0: LOGIN -->
    <div id="login-screen" class="screen active">
      <div class="login-container">
        <div class="login-title">ENTER ARENA</div>
        <input
          type="text"
          id="username-input"
          class="login-input"
          placeholder="Your Name..."
        />
        <button class="login-btn" onclick="handleLogin()">JOIN</button>
      </div>
    </div>

    <!-- SCREEN 1: MAIN MENU -->
    <div id="main-menu-screen" class="screen">
      <div class="menu-title">MAIN MENU</div>
      <div
        class="menu-section"
        style="cursor: pointer; text-align: center; margin-bottom: 0"
        onclick="showScreen('leaderboard-screen')"
      >
        <div
          style="font-size: 0.8rem; color: var(--ui-dim); margin-bottom: 5px"
        >
          Logged in as
        </div>
        <div style="font-size: 1.5rem; font-weight: bold" id="welcome-name">
          Player
        </div>
        <div
          style="font-size: 0.8rem; color: var(--accent-gold); margin-top: 5px"
        >
          View Leaderboard
        </div>
      </div>

      <div
        class="menu-section"
        onclick="showScreen('game-select-screen')"
        style="cursor: pointer; margin-top: 15px"
      >
        <div style="font-size: 1.2rem; text-align: center">🎮 Play Game</div>
      </div>

      <button class="nav-btn" onclick="logout()">Switch User</button>
    </div>

    <!-- SCREEN 2: LEADERBOARD -->
    <div id="leaderboard-screen" class="screen">
      <div class="menu-title">LEADERBOARD</div>
      <div class="menu-section">
        <div class="lb-container" id="lb-list">
          <!-- Populated by JS -->
          <div class="lb-row">
            <div style="text-align: center; width: 100%; color: var(--ui-dim)">
              Loading...
            </div>
          </div>
        </div>
      </div>
      <button class="nav-btn" onclick="showScreen('main-menu-screen')">
        Back
      </button>
    </div>

    <!-- SCREEN 3: GAME SELECT -->
    <div id="game-select-screen" class="screen">
      <div class="menu-title">SELECT GAME</div>

      <div class="menu-section">
        <div class="menu-label">Mode</div>
        <div class="btn-group" id="mode-group">
          <button class="btn-option selected" data-val="cpu">vs CPU</button>
          <button class="btn-option" data-val="local">Local 2P</button>
        </div>
      </div>

      <div class="menu-section">
        <div class="menu-label">Game Type</div>
        <div class="btn-group" id="game-type-group">
          <button class="btn-option selected" data-val="fifo">FIFO ⚡</button>
          <button class="btn-option" data-val="slide">Slide 🧩</button>
        </div>
      </div>

      <div id="cpu-settings">
        <div class="menu-section">
          <div class="menu-label">Difficulty</div>
          <div class="btn-group" id="diff-group">
            <button class="btn-option" data-val="easy">Easy</button>
            <button class="btn-option selected" data-val="mid">Medium</button>
            <button class="btn-option" data-val="hard">Hard</button>
          </div>
        </div>
        <div class="menu-section">
          <div class="menu-label">Time</div>
          <div class="btn-group" id="time-group">
            <button class="btn-option selected" data-val="30">30s</button>
            <button class="btn-option" data-val="60">60s</button>
            <button class="btn-option" data-val="120">2 Min</button>
          </div>
        </div>
      </div>

      <button class="start-btn" onclick="startGame()">START</button>
      <button class="nav-btn" onclick="showScreen('main-menu-screen')">
        Back
      </button>
    </div>

    <!-- SCREEN 4: GAME AREA -->
    <div id="game-screen" class="screen">
      <button class="top-btn back-btn" onclick="backFromGame()">← Back</button>
      <button class="top-btn restart-btn" onclick="resetCurrentGame()">
        Restart ↻
      </button>

      <div class="timer-section" id="timer-container">
        <div class="timer-display" id="timer-text">30</div>
        <div class="timer-track">
          <div class="timer-fill" id="timer-bar"></div>
        </div>
      </div>

      <div class="status-bar">
        <div class="player-info" id="player-x">
          <div class="p-name">PLAYER (X)</div>
          <div class="p-hand" id="count-x">Hand: 3</div>
        </div>
        <div class="player-info" id="player-o">
          <div class="p-name">CPU (O)</div>
          <div class="p-hand" id="count-o">Hand: 3</div>
        </div>
      </div>

      <div class="board" id="board">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
      </div>

      <div class="message" id="message">Your Turn</div>
    </div>

    <script>
      // ================= CONFIGURATION =================
      // PASTE YOUR GOOGLE APPS SCRIPT WEB APP URL HERE:
      const API_URL =
        "https://script.google.com/macros/s/AKfycbxqF94ftB1-1QCLGUqihe0Vl0VLeS9panpYYG2XWGj6g2_VK_R7V2FcGCir-gC54mTtIQ/exec";

      // ================= GLOBAL STATE =================
      let currentUser = null;
      let config = {
        time: 30,
        difficulty: "mid",
        gameType: "fifo",
        mode: "cpu",
      }; // mode: 'cpu' or 'local'

      const board = ["", "", "", "", "", "", "", "", ""];
      let currentPlayer = "X";
      let gameActive = true;
      let history = { X: [], O: [] };
      let inventory = { X: 3, O: 3 };
      const MAX_PIECES = 3;
      let timeLeft = 30;
      let timerInterval;
      let selectedPieceIndex = null;

      // DOM
      const cells = document.querySelectorAll(".cell");
      const messageEl = document.getElementById("message");
      const timerBar = document.getElementById("timer-bar");
      const timerText = document.getElementById("timer-text");

      // ================= AUTH & MENU LOGIC =================
      function handleLogin() {
        const name = document.getElementById("username-input").value.trim();
        if (name) {
          currentUser = name;
          localStorage.setItem("tictactoe_user", name);
          document.getElementById("welcome-name").innerText = name;
          showScreen("main-menu-screen");
          fetchLeaderboard(); // Load leaderboard in background
        }
      }

      function logout() {
        currentUser = null;
        localStorage.removeItem("tictactoe_user");
        showScreen("login-screen");
      }

      function checkSession() {
        const saved = localStorage.getItem("tictactoe_user");
        if (saved) {
          currentUser = saved;
          document.getElementById("welcome-name").innerText = saved;
          showScreen("main-menu-screen");
          fetchLeaderboard();
        } else {
          showScreen("login-screen");
        }
      }

      function showScreen(screenId) {
        document
          .querySelectorAll(".screen")
          .forEach((s) => s.classList.remove("active"));
        document.getElementById(screenId).classList.add("active");
        if (screenId === "game-select-screen") {
          // Toggle CPU settings visibility
          document.getElementById("cpu-settings").style.display =
            config.mode === "cpu" ? "block" : "none";
        }
        if (screenId === "leaderboard-screen") fetchLeaderboard();
        clearInterval(timerInterval);
      }

      // Menu Button Listeners
      document.querySelectorAll(".btn-group").forEach((group) => {
        group.addEventListener("click", (e) => {
          if (e.target.classList.contains("btn-option")) {
            group
              .querySelectorAll(".btn-option")
              .forEach((btn) => btn.classList.remove("selected"));
            e.target.classList.add("selected");
            const val = e.target.getAttribute("data-val");

            if (group.id === "mode-group") {
              config.mode = val;
              document.getElementById("cpu-settings").style.display =
                val === "cpu" ? "block" : "none";
            }
            if (group.id === "game-type-group") config.gameType = val;
            if (group.id === "diff-group") config.difficulty = val;
            if (group.id === "time-group") config.time = parseInt(val);
          }
        });
      });

      // ================= GOOGLE SHEET API =================
      async function apiCall(action, params) {
        if (!API_URL || API_URL === "PASTE_YOUR_WEB_APP_URL_HERE") {
          console.warn("API URL not set. Scores won't be saved.");
          return null;
        }
        let url = `${API_URL}?action=${action}`;
        for (let key in params) {
          url += `&${key}=${encodeURIComponent(params[key])}`;
        }

        try {
          const resp = await fetch(url);
          return await resp.json();
        } catch (e) {
          console.error("API Error", e);
          return null;
        }
      }

      async function updateScore(result) {
        if (currentUser && config.mode === "cpu") {
          await apiCall("updateScore", {
            username: currentUser,
            result: result,
          });
        } else if (currentUser && config.mode === "local") {
          // In local, winner is passed explicitly
          await apiCall("updateScore", { username: result, result: "win" });
        }
      }

      async function fetchLeaderboard() {
        const data = await apiCall("getLeaderboard", {});
        const container = document.getElementById("lb-list");
        if (!data) {
          container.innerHTML =
            "<div style='text-align:center; color:var(--ui-dim)'>Connect Sheet to view</div>";
          return;
        }

        let html = "";
        data.forEach((row, i) => {
          html += `<div class="lb-row">
                    <div class="lb-rank">${i + 1}</div>
                    <div class="lb-name">${row.username}</div>
                    <div class="lb-score">${row.wins} W</div>
                </div>`;
        });
        container.innerHTML = html;
      }

      // ================= CORE GAME LOGIC =================
      function startGame() {
        showScreen("game-screen");
        resetGameState();

        // Setup UI labels
        document.getElementById("timer-container").style.display =
          config.mode === "cpu" ? "flex" : "none";

        if (config.mode === "local") {
          // Local Multiplayer Setup
          document
            .getElementById("player-x")
            .querySelector(".p-name").innerText = currentUser + " (X)";
          document
            .getElementById("player-o")
            .querySelector(".p-name").innerText = "Guest (O)";
        } else {
          // CPU Setup
          if (config.playerRole === "O") {
            document
              .getElementById("player-x")
              .querySelector(".p-name").innerText = "CPU (X)";
            document
              .getElementById("player-o")
              .querySelector(".p-name").innerText = currentUser + " (O)";
          } else {
            document
              .getElementById("player-x")
              .querySelector(".p-name").innerText = currentUser + " (X)";
            document
              .getElementById("player-o")
              .querySelector(".p-name").innerText = "CPU (O)";
          }
        }

        updateUI();

        // Start Logic
        if (config.mode === "cpu" && config.playerRole === "O") {
          currentPlayer = "X";
          setTimeout(computerMove, 800);
          startGlobalTimer();
        } else {
          currentPlayer = "X";
          if (config.mode === "cpu") startGlobalTimer();
        }
      }

      function resetGameState() {
        board.fill("");
        history = { X: [], O: [] };
        inventory = { X: 3, O: 3 };
        gameActive = true;
        selectedPieceIndex = null;
        messageEl.style.color = "var(--ui-dim)";
        messageEl.innerText = "Your Turn";

        cells.forEach((cell) => {
          cell.innerText = "";
          cell.className = "cell";
        });

        timeLeft = config.time;
        updateTimerUI();
      }

      function resetCurrentGame() {
        clearInterval(timerInterval);
        resetGameState();

        if (config.mode === "cpu" && config.playerRole === "O") {
          currentPlayer = "X";
          setTimeout(computerMove, 800);
        } else {
          currentPlayer = "X";
        }
        updateUI();
        if (config.mode === "cpu") startGlobalTimer();
      }

      function backFromGame() {
        clearInterval(timerInterval);
        showScreen("game-select-screen");
      }

      function handleCellClick(e) {
        const index = parseInt(e.target.getAttribute("data-index"));
        const isPlayerTurn =
          config.mode === "local" ? true : currentPlayer === config.playerRole;

        if (!gameActive || !isPlayerTurn) return;

        if (config.gameType === "fifo") {
          handleFifoClick(index);
        } else {
          handleSlideClick(index);
        }
      }

      // ==========================================
      // GAME LOGIC: FIFO & SLIDE (Shared Logic)
      // ==========================================

      function handleFifoClick(index) {
        if (board[index] !== "") return;
        performFifoMove(index, currentPlayer);
        if (checkWin(currentPlayer)) {
          handleGameEnd(currentPlayer);
          return;
        }
        switchTurn();
      }

      function handleSlideClick(index) {
        if (inventory[currentPlayer] > 0) {
          if (board[index] !== "") return;
          placePiece(index, currentPlayer);
          inventory[currentPlayer]--;
          history[currentPlayer].push(index);
          if (checkWin(currentPlayer)) {
            handleGameEnd(currentPlayer);
            return;
          }
          switchTurn();
        } else {
          if (board[index] === currentPlayer) {
            clearSelection();
            selectedPieceIndex = index;
            cells[index].classList.add("selected-piece");
            highlightMoves(index);
            messageEl.innerText = "Select adjacent empty spot";
          } else if (selectedPieceIndex !== null && board[index] === "") {
            if (isNeighbor(selectedPieceIndex, index)) {
              removePiece(selectedPieceIndex);
              placePiece(index, currentPlayer);
              const histIdx =
                history[currentPlayer].indexOf(selectedPieceIndex);
              if (histIdx > -1) history[currentPlayer].splice(histIdx, 1);
              history[currentPlayer].push(index);
              clearSelection();
              if (checkWin(currentPlayer)) {
                handleGameEnd(currentPlayer);
                return;
              }
              switchTurn();
            }
          }
        }
      }

      function performFifoMove(index, player) {
        if (inventory[player] > 0) {
          placePiece(index, player);
          inventory[player]--;
          history[player].push(index);
        } else {
          let removedIndex;
          // Logic for CPU difficulty
          let isCpu = config.mode === "cpu" && player !== config.playerRole;
          if (isCpu && config.difficulty === "hard") {
            removedIndex = history[player].shift();
          } else if (isCpu && config.difficulty === "mid") {
            removedIndex = history[player].splice(1, 1)[0];
          } else {
            removedIndex = history[player].shift();
          }

          removePiece(removedIndex);
          placePiece(index, player);
          history[player].push(index);
        }
        updateFifoHighlight();
      }

      function updateFifoHighlight() {
        if (config.gameType !== "fifo") return;
        cells.forEach((c) =>
          c.classList.remove("oldest-piece", "selected-piece", "valid-move"),
        );

        let actorRole = currentPlayer;
        // Highlight only if it's a human's turn (either in Local or CPU mode)
        let isHumanTurn =
          config.mode === "local" ? true : currentPlayer === config.playerRole;

        if (
          isHumanTurn &&
          inventory[actorRole] === 0 &&
          history[actorRole].length > 0
        ) {
          const oldestIndex = history[actorRole][0];
          cells[oldestIndex].classList.add("oldest-piece");
        }
      }

      function highlightMoves(index) {
        const neighbors = getNeighbors(index);
        neighbors.forEach((n) => {
          if (board[n] === "") cells[n].classList.add("valid-move");
        });
      }

      function clearSelection() {
        selectedPieceIndex = null;
        cells.forEach((c) =>
          c.classList.remove("selected-piece", "valid-move", "oldest-piece"),
        );
      }

      function getNeighbors(i) {
        const map = {
          0: [1, 3],
          1: [0, 2, 4],
          2: [1, 5],
          3: [0, 4, 6],
          4: [1, 3, 5, 7],
          5: [2, 4, 8],
          6: [3, 7],
          7: [4, 6, 8],
          8: [5, 7],
        };
        return map[i];
      }

      function isNeighbor(from, to) {
        return getNeighbors(from).includes(to);
      }

      // --- SHARED HELPERS ---
      function placePiece(index, player) {
        board[index] = player;
        cells[index].innerText = player;
        cells[index].classList.add(player === "X" ? "x-mark" : "o-mark");
      }

      function removePiece(index) {
        board[index] = "";
        cells[index].innerText = "";
        cells[index].className = "cell";
      }

      function switchTurn() {
        currentPlayer = currentPlayer === "X" ? "O" : "X";
        updateUI();

        if (config.mode === "cpu" && currentPlayer !== config.playerRole) {
          messageEl.innerText = "CPU Thinking...";
          setTimeout(computerMove, 600);
        } else {
          if (inventory[currentPlayer] > 0)
            messageEl.innerText = "Place a piece";
          else
            messageEl.innerText =
              config.gameType === "fifo"
                ? "Move oldest piece"
                : "Select piece to move";

          if (config.gameType === "fifo") updateFifoHighlight();
        }
      }

      // ==========================================
      // AI LOGIC (CPU)
      // ==========================================
      function computerMove() {
        if (!gameActive) return;
        const cpuRole = currentPlayer;
        const emptyIndices = board
          .map((v, i) => (v === "" ? i : null))
          .filter((v) => v !== null);

        if (config.gameType === "slide")
          computerMoveSlide(cpuRole, emptyIndices);
        else computerMoveFifo(cpuRole, emptyIndices);
      }

      function computerMoveFifo(cpuRole, emptyIndices) {
        if (inventory[cpuRole] > 0) {
          let winMove = findWinningMove(cpuRole);
          if (winMove) {
            performFifoMove(winMove, cpuRole);
            handleGameEnd(cpuRole);
            return;
          }
          let blockMove = findWinningMove(config.playerRole);
          if (blockMove) {
            performFifoMove(blockMove, cpuRole);
            switchTurn();
            return;
          }
          performFifoMove(
            emptyIndices[Math.floor(Math.random() * emptyIndices.length)],
            cpuRole,
          );
          switchTurn();
          return;
        }

        if (config.difficulty === "hard") {
          let winMove = findBestMoveForAnyPiece(cpuRole);
          if (winMove) {
            executeCustomFifoMove(winMove.oldIndex, winMove.newIndex, cpuRole);
            handleGameEnd(cpuRole);
            return;
          }
          let blockMove = findBlockingMoveForAnyPiece(cpuRole);
          if (blockMove) {
            executeCustomFifoMove(
              blockMove.oldIndex,
              blockMove.newIndex,
              cpuRole,
            );
            switchTurn();
            return;
          }
          let rOld =
            history[cpuRole][
              Math.floor(Math.random() * history[cpuRole].length)
            ];
          let rNew =
            emptyIndices[Math.floor(Math.random() * emptyIndices.length)];
          executeCustomFifoMove(rOld, rNew, cpuRole);
          switchTurn();
          return;
        }

        if (config.difficulty === "mid" && history[cpuRole].length >= 2) {
          const piece = history[cpuRole][1];
          let winMove = findMoveForSpecificPiece(cpuRole, piece);
          if (winMove) {
            executeCustomFifoMove(piece, winMove, cpuRole);
            handleGameEnd(cpuRole);
            return;
          }
          let blockMove = findBlockForSpecificPiece(cpuRole, piece);
          if (blockMove) {
            executeCustomFifoMove(piece, blockMove, cpuRole);
            switchTurn();
            return;
          }
          let rNew =
            emptyIndices[Math.floor(Math.random() * emptyIndices.length)];
          executeCustomFifoMove(piece, rNew, cpuRole);
          switchTurn();
          return;
        }

        let winMove = findWinningMove(cpuRole);
        if (winMove) {
          performFifoMove(winMove, cpuRole);
          handleGameEnd(cpuRole);
          return;
        }
        let blockMove = findWinningMove(config.playerRole);
        if (blockMove) {
          performFifoMove(blockMove, cpuRole);
          switchTurn();
          return;
        }
        performFifoMove(
          emptyIndices[Math.floor(Math.random() * emptyIndices.length)],
          cpuRole,
        );
        switchTurn();
      }

      function executeCustomFifoMove(removeIdx, placeIdx, player) {
        removePiece(removeIdx);
        const histIdx = history[player].indexOf(removeIdx);
        if (histIdx > -1) history[player].splice(histIdx, 1);
        placePiece(placeIdx, player);
        history[player].push(placeIdx);
        updateFifoHighlight();
      }

      function computerMoveSlide(cpuRole, emptyIndices) {
        if (inventory[cpuRole] > 0) {
          let winMove = findWinningMove(cpuRole);
          if (winMove) {
            placePiece(winMove, cpuRole);
            inventory[cpuRole]--;
            history[cpuRole].push(winMove);
            handleGameEnd(cpuRole);
            return;
          }
          let blockMove = findWinningMove(config.playerRole);
          if (blockMove) {
            placePiece(blockMove, cpuRole);
            inventory[cpuRole]--;
            history[cpuRole].push(blockMove);
            switchTurn();
            return;
          }
          let idx =
            emptyIndices[Math.floor(Math.random() * emptyIndices.length)];
          placePiece(idx, cpuRole);
          inventory[cpuRole]--;
          history[cpuRole].push(idx);
          switchTurn();
          return;
        }

        // Win logic
        for (let p of history[cpuRole]) {
          let neighbors = getNeighbors(p);
          for (let n of neighbors) {
            if (board[n] === "") {
              board[p] = "";
              board[n] = cpuRole;
              if (checkWinOnBoard(board, cpuRole)) {
                removePiece(p);
                placePiece(n, cpuRole);
                let hIdx = history[cpuRole].indexOf(p);
                history[cpuRole].splice(hIdx, 1);
                history[cpuRole].push(n);
                handleGameEnd(cpuRole);
                return;
              }
              board[p] = cpuRole;
              board[n] = "";
            }
          }
        }
        // Block logic ... (skipped for brevity, similar to above)
        // Random move
        if (history[cpuRole].length > 0) {
          let p =
            history[cpuRole][
              Math.floor(Math.random() * history[cpuRole].length)
            ];
          let neighbors = getNeighbors(p);
          let validN = neighbors.filter((n) => board[n] === "");
          if (validN.length > 0) {
            let n = validN[Math.floor(Math.random() * validN.length)];
            removePiece(p);
            placePiece(n, cpuRole);
            let hIdx = history[cpuRole].indexOf(p);
            history[cpuRole].splice(hIdx, 1);
            history[cpuRole].push(n);
          }
        }
        switchTurn();
      }

      // AI Helpers
      function findWinningMove(player) {
        const empty = board
          .map((v, i) => (v === "" ? i : null))
          .filter((v) => v !== null);
        for (let i of empty) {
          board[i] = player;
          if (checkWinOnBoard(board, player)) {
            board[i] = "";
            return i;
          }
          board[i] = "";
        }
        return null;
      }
      function findBestMoveForAnyPiece(player) {
        const myPieces = history[player];
        const empty = board
          .map((v, i) => (v === "" ? i : null))
          .filter((v) => v !== null);
        for (let old of myPieces) {
          for (let newIdx of empty) {
            board[old] = "";
            board[newIdx] = player;
            if (checkWinOnBoard(board, player)) {
              board[old] = player;
              return { oldIndex: old, newIndex: newIdx };
            }
            board[old] = player;
          }
        }
        return null;
      }
      function findBlockingMoveForAnyPiece(cpu) {
        let spot = findWinningMove(config.playerRole);
        if (spot) return { oldIndex: history[cpu][0], newIndex: spot };
        return null;
      }
      function findMoveForSpecificPiece(player, pieceIdx) {
        const empty = board
          .map((v, i) => (v === "" ? i : null))
          .filter((v) => v !== null);
        for (let i of empty) {
          board[pieceIdx] = "";
          board[i] = player;
          if (checkWinOnBoard(board, player)) {
            board[pieceIdx] = player;
            return i;
          }
          board[pieceIdx] = player;
        }
        return null;
      }
      function findBlockForSpecificPiece(cpu, pieceIdx) {
        return findWinningMove(config.playerRole);
      }

      // ==========================================
      // TIMER & WIN & UI
      // ==========================================
      function startGlobalTimer() {
        clearInterval(timerInterval);
        timeLeft = config.time;
        updateTimerUI();
        timerInterval = setInterval(() => {
          timeLeft--;
          updateTimerUI();
          if (timeLeft <= 0) {
            clearInterval(timerInterval);
            if (gameActive) handleGameEnd(null, "Time Up! Draw");
          }
        }, 1000);
      }

      function updateTimerUI() {
        timerText.innerText = timeLeft;
        const percent = (timeLeft / config.time) * 100;
        timerBar.style.width = percent + "%";
        if (timeLeft <= 10) {
          timerText.classList.add("warning");
          timerBar.classList.add("warning");
        } else {
          timerText.classList.remove("warning");
          timerBar.classList.remove("warning");
        }
      }

      const winConditions = [
        [0, 1, 2],
        [3, 4, 5],
        [6, 7, 8],
        [0, 3, 6],
        [1, 4, 7],
        [2, 5, 8],
        [0, 4, 8],
        [2, 4, 6],
      ];
      function checkWin(player) {
        return checkWinOnBoard(board, player);
      }
      function checkWinOnBoard(b, player) {
        return winConditions.some((cond) => cond.every((i) => b[i] === player));
      }

      function handleGameEnd(winner, msg) {
        gameActive = false;
        clearInterval(timerInterval);

        // Determine Message and API Call
        if (config.mode === "cpu") {
          if (winner === config.playerRole) {
            messageEl.innerText = "YOU WIN!";
            messageEl.style.color = "var(--accent-x)";
            updateScore("win");
          } else if (winner === null) {
            messageEl.innerText = msg || "Draw!";
            messageEl.style.color = "#ef4444";
          } else {
            messageEl.innerText = "CPU WINS";
            messageEl.style.color = "var(--accent-o)";
            updateScore("loss");
          }
        } else {
          // Local Mode
          if (winner) {
            let winnerName = winner === "X" ? currentUser : "Guest"; // Assuming User is always X for now
            messageEl.innerText = `${winnerName} Wins!`;
            messageEl.style.color =
              winner === "X" ? "var(--accent-x)" : "var(--accent-o)";
            updateScore(winnerName); // Record win
          } else {
            messageEl.innerText = "Draw!";
            messageEl.style.color = "#ef4444";
          }
        }
        clearSelection();
      }

      function updateUI() {
        document.getElementById("count-x").innerText =
          `Hand: ${inventory["X"]}`;
        document.getElementById("count-o").innerText =
          `Hand: ${inventory["O"]}`;
        document
          .getElementById("player-x")
          .classList.toggle("active", currentPlayer === "X");
        document
          .getElementById("player-o")
          .classList.toggle("active", currentPlayer === "O");

        if (config.gameType === "fifo") updateFifoHighlight();
      }

      // INIT
      cells.forEach((cell) => cell.addEventListener("click", handleCellClick));
      window.onload = checkSession;
    </script>
  </body>
