<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game Hub Arena</title>
    <style>
      :root {
        --bg-color: #0f172a;
        --board-bg: #1e293b;
        --accent-x: #00f5ff;
        --accent-o: #ff00ff;
        --accent-gold: #ffcc00;
        --text-color: #f8fafc;
        --ui-dim: #64748b;
        --btn-bg: #334155;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        user-select: none;
        overflow: hidden;
      }

      /* --- SCREENS --- */
      .screen {
        display: none;
        width: 100%;
        height: 100%;
        position: relative;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        animation: fadeIn 0.4s ease;
      }
      .screen.active {
        display: flex;
      }

      /* --- MENUS --- */
      .menu-title {
        font-size: 2.5rem;
        font-weight: 800;
        letter-spacing: 2px;
        background: linear-gradient(to right, var(--accent-x), var(--accent-o));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 20px;
      }
      .menu-section {
        background: var(--board-bg);
        padding: 20px;
        border-radius: 20px;
        width: 340px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        border: 1px solid rgba(255, 255, 255, 0.05);
        margin-bottom: 15px;
      }
      .menu-label {
        font-size: 0.85rem;
        color: var(--ui-dim);
        margin-bottom: 12px;
        text-transform: uppercase;
        font-weight: bold;
      }
      .btn-group {
        display: flex;
        gap: 10px;
        justify-content: center;
      }

      .btn-option {
        flex: 1;
        padding: 12px;
        background: var(--btn-bg);
        border: 2px solid transparent;
        border-radius: 10px;
        color: var(--text-color);
        cursor: pointer;
        font-weight: 600;
        transition: all 0.2s;
        font-size: 0.95rem;
      }
      .btn-option:hover {
        background: #475569;
      }
      .btn-option.selected {
        border-color: var(--accent-x);
        background: rgba(0, 245, 255, 0.15);
        color: #fff;
      }
      .btn-option.selected.o-type {
        border-color: var(--accent-o);
        background: rgba(255, 0, 255, 0.15);
      }

      .start-btn {
        padding: 15px 60px;
        font-size: 1.2rem;
        background: linear-gradient(135deg, var(--accent-x), var(--accent-o));
        border: none;
        border-radius: 30px;
        color: #000;
        font-weight: 800;
        cursor: pointer;
        transition: transform 0.2s;
        margin-top: 10px;
      }
      .start-btn:hover {
        transform: translateY(-3px);
      }
      .nav-btn {
        padding: 10px 30px;
        background: transparent;
        border: 1px solid var(--ui-dim);
        color: var(--ui-dim);
        border-radius: 25px;
        cursor: pointer;
        margin-top: 15px;
      }

      /* --- SEARCHING SPINNER --- */
      .loader {
        border: 5px solid var(--board-bg);
        border-top: 5px solid var(--accent-x);
        border-radius: 50%;
        width: 50px;
        height: 50px;
        animation: spin 1s linear infinite;
        margin: 20px auto;
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      /* --- LEADERBOARD --- */
      .lb-container {
        width: 340px;
        max-height: 300px;
        overflow-y: auto;
        background: #0f172a;
        border-radius: 12px;
        padding: 10px;
      }
      .lb-row {
        display: flex;
        justify-content: space-between;
        padding: 8px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }
      .lb-rank {
        width: 30px;
        font-weight: bold;
        color: var(--ui-dim);
      }
      .lb-name {
        flex: 1;
        margin-left: 10px;
      }
      .lb-score {
        font-weight: bold;
        color: var(--accent-gold);
      }

      /* --- GAME UI --- */
      .top-btn {
        position: absolute;
        top: 20px;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: var(--text-color);
        padding: 8px 20px;
        border-radius: 20px;
        cursor: pointer;
        font-weight: 500;
        font-size: 0.9rem;
        z-index: 10;
      }
      .top-btn:hover {
        background: rgba(255, 255, 255, 0.2);
      }
      .back-btn {
        left: 20px;
      }
      .restart-btn {
        right: 20px;
      }

      .timer-section {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 340px;
        margin-bottom: 15px;
      }
      .timer-display {
        font-size: 3rem;
        font-weight: 700;
        line-height: 1;
        margin-bottom: 5px;
      }
      .timer-display.warning {
        color: #ef4444;
        animation: pulse 1s infinite;
      }
      .timer-track {
        width: 100%;
        height: 6px;
        background: var(--btn-bg);
        border-radius: 3px;
        overflow: hidden;
      }
      .timer-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--accent-x), var(--accent-o));
        width: 100%;
        transition: width 1s linear;
      }

      .status-bar {
        display: flex;
        justify-content: space-between;
        width: 340px;
        margin-bottom: 20px;
        background: var(--board-bg);
        padding: 12px 20px;
        border-radius: 16px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
      }
      .player-info {
        text-align: center;
        flex: 1;
        transition: all 0.3s;
        opacity: 0.5;
      }
      .player-info:first-child {
        border-right: 1px solid rgba(255, 255, 255, 0.1);
      }
      .player-info.active {
        opacity: 1;
      }
      .p-name {
        font-weight: 600;
        font-size: 0.9rem;
        letter-spacing: 1px;
      }
      .p-hand {
        font-size: 0.75rem;
        color: var(--ui-dim);
        margin-top: 4px;
      }
      .player-info.active .p-name {
        text-shadow: 0 0 10px currentColor;
      }

      .board {
        display: grid;
        grid-template-columns: repeat(3, 100px);
        grid-template-rows: repeat(3, 100px);
        gap: 12px;
        background: var(--board-bg);
        padding: 12px;
        border-radius: 20px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
      }

      .cell {
        background: var(--bg-color);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 3.5rem;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.15s ease-out;
        border: 2px solid transparent;
      }
      .cell:hover {
        background: #1e293b;
        transform: scale(1.02);
      }

      .cell.x-mark {
        color: var(--accent-x);
        text-shadow: 0 0 20px var(--accent-x);
      }
      .cell.o-mark {
        color: var(--accent-o);
        text-shadow: 0 0 20px var(--accent-o);
      }

      .cell.oldest-piece {
        border: 2px dashed var(--accent-gold);
        box-shadow: 0 0 15px rgba(255, 204, 0, 0.3);
        animation: pulseOld 1.5s infinite;
      }
      .cell.selected-piece {
        border: 2px solid #fff;
        background: rgba(255, 255, 255, 0.1);
      }
      .cell.valid-move {
        border: 2px solid var(--accent-x);
        background: rgba(0, 245, 255, 0.1);
      }

      .message {
        margin-top: 25px;
        font-size: 1.1rem;
        height: 20px;
        color: var(--ui-dim);
        letter-spacing: 0.5px;
        font-weight: 500;
      }

      @keyframes pulseOld {
        0% {
          box-shadow: 0 0 5px var(--accent-gold);
        }
        50% {
          box-shadow: 0 0 20px var(--accent-gold);
        }
        100% {
          box-shadow: 0 0 5px var(--accent-gold);
        }
      }
      @keyframes pulse {
        50% {
          opacity: 0.6;
        }
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <!-- SCREEN 0: LOGIN -->
    <div id="login-screen" class="screen active">
      <div class="menu-title">ENTER ARENA</div>
      <div class="menu-section" style="text-align: center">
        <input
          type="text"
          id="username-input"
          class="btn-option"
          style="
            text-align: center;
            background: var(--bg-color);
            border: 2px solid var(--ui-dim);
          "
          placeholder="Enter Name..."
        />
        <button
          class="start-btn"
          style="width: 100%; margin-top: 15px"
          onclick="handleLogin()"
        >
          JOIN
        </button>
      </div>
    </div>

    <!-- SCREEN 1: MAIN MENU -->
    <div id="main-menu-screen" class="screen">
      <div class="menu-title">MAIN MENU</div>
      <div
        class="menu-section"
        style="cursor: pointer; text-align: center; margin-bottom: 0"
        onclick="showScreen('leaderboard-screen')"
      >
        <div style="font-size: 0.8rem; color: var(--ui-dim)">Logged in as</div>
        <div style="font-size: 1.5rem; font-weight: bold" id="welcome-name">
          Player
        </div>
        <div
          style="font-size: 0.8rem; color: var(--accent-gold); margin-top: 5px"
        >
          View Leaderboard
        </div>
      </div>

      <div
        class="menu-section"
        onclick="showScreen('game-select-screen')"
        style="cursor: pointer; margin-top: 15px"
      >
        <div style="font-size: 1.2rem; text-align: center">🎮 Play Game</div>
      </div>

      <button class="nav-btn" onclick="logout()">Switch User</button>
    </div>

    <!-- SCREEN 2: LEADERBOARD -->
    <div id="leaderboard-screen" class="screen">
      <div class="menu-title">LEADERBOARD</div>
      <div class="menu-section">
        <div class="lb-container" id="lb-list"></div>
      </div>
      <button class="nav-btn" onclick="showScreen('main-menu-screen')">
        Back
      </button>
    </div>

    <!-- SCREEN 3: GAME SELECT -->
    <div id="game-select-screen" class="screen">
      <div class="menu-title">SELECT MODE</div>

      <div class="menu-section">
        <div class="menu-label">Game Type</div>
        <div class="btn-group" id="game-type-group">
          <button class="btn-option selected" data-val="fifo">FIFO ⚡</button>
          <button class="btn-option" data-val="slide">Slide 🧩</button>
        </div>
      </div>

      <div id="cpu-settings">
        <div class="menu-section">
          <div class="menu-label">Difficulty (CPU)</div>
          <div class="btn-group" id="diff-group">
            <button class="btn-option" data-val="easy">Easy</button>
            <button class="btn-option selected" data-val="mid">Medium</button>
            <button class="btn-option" data-val="hard">Hard</button>
          </div>
        </div>
        <div class="menu-section">
          <div class="menu-label">Time</div>
          <div class="btn-group" id="time-group">
            <button class="btn-option selected" data-val="30">30s</button>
            <button class="btn-option" data-val="60">60s</button>
          </div>
        </div>
      </div>

      <!-- BUTTONS FOR ONLINE VS CPU -->
      <button
        class="start-btn"
        onclick="startOnlineSearch()"
        style="background: var(--accent-o)"
      >
        Search Online Player
      </button>
      <button
        class="start-btn"
        onclick="startGame('cpu')"
        style="margin-top: 10px; background: var(--ui-dim)"
      >
        Play vs Computer
      </button>

      <button class="nav-btn" onclick="showScreen('main-menu-screen')">
        Back
      </button>
    </div>

    <!-- SCREEN 3.5: SEARCHING -->
    <div id="searching-screen" class="screen">
      <div class="menu-title">SEARCHING...</div>
      <div class="menu-section" style="text-align: center">
        <div class="loader"></div>
        <p>Looking for opponent...</p>
        <p
          style="font-size: 0.8rem; color: var(--ui-dim); margin-top: 10px"
          id="search-status"
        >
          (If no one joins, you play CPU)
        </p>
      </div>
      <button class="nav-btn" onclick="cancelSearch()">Cancel</button>
    </div>

    <!-- SCREEN 4: GAME AREA -->
    <div id="game-screen" class="screen">
      <button class="top-btn back-btn" onclick="backFromGame()">← Quit</button>
      <button class="top-btn restart-btn" onclick="resetCurrentGame()">
        Restart ↻
      </button>

      <div class="timer-section" id="timer-container">
        <div class="timer-display" id="timer-text">30</div>
        <div class="timer-track">
          <div class="timer-fill" id="timer-bar"></div>
        </div>
      </div>

      <div class="status-bar">
        <div class="player-info" id="player-x">
          <div class="p-name">Player X</div>
          <div class="p-hand" id="count-x">Hand: 3</div>
        </div>
        <div class="player-info" id="player-o">
          <div class="p-name">Player O</div>
          <div class="p-hand" id="count-o">Hand: 3</div>
        </div>
      </div>

      <div class="board" id="board">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
      </div>

      <div class="message" id="message">Your Turn</div>
    </div>

    <script>
      // ================= CONFIGURATION =================
      // PASTE YOUR URL HERE. If you leave it as is, it runs in OFFLINE MODE.
      const API_URL =
        "https://script.google.com/macros/s/AKfycbxqF94ftB1-1QCLGUqihe0Vl0VLeS9panpYYG2XWGj6g2_VK_R7V2FcGCir-gC54mTtIQ/exec";

      // ================= GLOBAL STATE =================
      let currentUser = null;
      let config = {
        time: 30,
        difficulty: "mid",
        gameType: "fifo",
        mode: "cpu",
      };
      let myRole = "X";

      const board = ["", "", "", "", "", "", "", "", ""];
      let currentPlayer = "X";
      let gameActive = true;
      let history = { X: [], O: [] };
      let inventory = { X: 3, O: 3 };
      const MAX_PIECES = 3;
      let timeLeft = 30;
      let timerInterval;
      let selectedPieceIndex = null;

      // Online State
      let currentGameId = null;
      let syncInterval = null;
      let searchInterval = null;

      // Mock DB for Offline Mode
      let mockDatabase = { leaderboard: [], games: [], waitingGame: null };

      // DOM
      const cells = document.querySelectorAll(".cell");
      const messageEl = document.getElementById("message");
      const timerBar = document.getElementById("timer-bar");
      const timerText = document.getElementById("timer-text");

      // ================= AUTH & MENU LOGIC =================
      function handleLogin() {
        const name = document.getElementById("username-input").value.trim();
        if (name) {
          currentUser = name;
          localStorage.setItem("tictactoe_user", name);
          document.getElementById("welcome-name").innerText = name;
          showScreen("main-menu-screen");
          fetchLeaderboard();
        }
      }

      function logout() {
        currentUser = null;
        localStorage.removeItem("tictactoe_user");
        showScreen("login-screen");
      }

      function checkSession() {
        const saved = localStorage.getItem("tictactoe_user");
        if (saved) {
          currentUser = saved;
          document.getElementById("welcome-name").innerText = saved;
          showScreen("main-menu-screen");
          fetchLeaderboard();
        } else {
          showScreen("login-screen");
        }
      }

      function showScreen(screenId) {
        document
          .querySelectorAll(".screen")
          .forEach((s) => s.classList.remove("active"));
        document.getElementById(screenId).classList.add("active");
        clearInterval(timerInterval);
      }

      // Menu Listeners
      document.querySelectorAll(".btn-group").forEach((group) => {
        group.addEventListener("click", (e) => {
          if (e.target.classList.contains("btn-option")) {
            group
              .querySelectorAll(".btn-option")
              .forEach((btn) => btn.classList.remove("selected"));
            e.target.classList.add("selected");
            const val = e.target.getAttribute("data-val");
            if (group.id === "game-type-group") config.gameType = val;
            if (group.id === "diff-group") config.difficulty = val;
            if (group.id === "time-group") config.time = parseInt(val);
          }
        });
      });

      // ================= GOOGLE SHEET API (WITH OFFLINE FALLBACK) =================
      async function apiCall(action, params) {
        // DETECT IF URL IS VALID
        const isOnline = API_URL.startsWith("https://script.google.com");

        if (isOnline) {
          // REAL ONLINE MODE
          let url = `${API_URL}?action=${action}`;
          for (let key in params) {
            url += `&${key}=${encodeURIComponent(params[key])}`;
          }
          try {
            const resp = await fetch(url);
            return await resp.json();
          } catch (e) {
            console.error("Network Error", e);
            return null;
          }
        } else {
          // OFFLINE MOCK MODE
          console.log(
            `%c MOCK MODE: ${action}`,
            "color: orange; font-weight: bold;",
            params,
          );
          return mockApi(action, params);
        }
      }

      function mockApi(action, params) {
        // Simulate server delay
        return new Promise((resolve) => {
          setTimeout(() => {
            if (action === "updateScore") {
              let user = mockDatabase.leaderboard.find(
                (u) => u.username === params.username,
              );
              if (!user) {
                user = { username: params.username, wins: 0, losses: 0 };
                mockDatabase.leaderboard.push(user);
              }
              if (params.result === "win") user.wins++;
              else user.losses++;
              resolve({ status: "ok" });
            } else if (action === "getLeaderboard") {
              mockDatabase.leaderboard.sort((a, b) => b.wins - a.wins);
              resolve(mockDatabase.leaderboard);
            } else if (action === "searchGame") {
              // If someone is waiting, join them
              if (mockDatabase.waitingGame) {
                let game = mockDatabase.waitingGame;
                game.playerO = params.username;
                game.status = "ACTIVE";
                mockDatabase.waitingGame = null;
                resolve({
                  status: "joined",
                  gameId: game.id,
                  role: "O",
                  opponent: game.playerX,
                });
              } else {
                // Create new waiting game
                let id = "game-" + Math.random();
                mockDatabase.waitingGame = {
                  id: id,
                  playerX: params.username,
                  playerO: "",
                  board: "---------",
                  status: "WAITING",
                };
                resolve({ status: "waiting", gameId: id, role: "X" });
              }
            } else if (action === "checkGame") {
              if (
                mockDatabase.waitingGame &&
                mockDatabase.waitingGame.id === params.gameId
              ) {
                resolve({ status: "WAITING" });
              } else {
                // In mock mode, if not waiting, assume active (simplified)
                resolve({
                  status: "ACTIVE",
                  board: board.join(","),
                  opponent: "Mock Bot",
                });
              }
            } else if (action === "sendMove") {
              resolve({ status: "ok" });
            } else if (action === "endGame") {
              resolve({ status: "closed" });
            } else {
              resolve({});
            }
          }, 300);
        });
      }

      async function updateScore(result) {
        await apiCall("updateScore", { username: currentUser, result: result });
        fetchLeaderboard(); // Refresh local list
      }

      async function fetchLeaderboard() {
        const data = await apiCall("getLeaderboard", {});
        const container = document.getElementById("lb-list");
        if (!data) {
          container.innerHTML =
            "<div style='text-align:center; color:var(--ui-dim)'>Error loading</div>";
          return;
        }
        let html = "";
        data.forEach((row, i) => {
          html += `<div class="lb-row"><div class="lb-rank">${i + 1}</div><div class="lb-name">${row.username}</div><div class="lb-score">${row.wins} W</div></div>`;
        });
        container.innerHTML = html;
      }

      // ================= MULTIPLAYER LOGIC =================
      async function startOnlineSearch() {
        showScreen("searching-screen");
        const res = await apiCall("searchGame", { username: currentUser });

        if (res.status === "joined") {
          startOnlineGame(res.gameId, res.role, res.opponent);
        } else if (res.status === "waiting") {
          currentGameId = res.gameId;
          myRole = res.role;
          pollForOpponent();
        } else {
          startGame("cpu"); // Fallback
        }
      }

      async function pollForOpponent() {
        let attempts = 0;
        searchInterval = setInterval(async () => {
          attempts++;
          const res = await apiCall("checkGame", { gameId: currentGameId });

          if (res.status === "ACTIVE") {
            clearInterval(searchInterval);
            startOnlineGame(currentGameId, myRole, res.opponent);
          } else if (attempts > 10) {
            // Approx 30 seconds timeout
            clearInterval(searchInterval);
            document.getElementById("search-status").innerText =
              "No players found. Switching to CPU...";
            setTimeout(() => {
              config.difficulty = "easy";
              startGame("cpu");
            }, 2000);
          }
        }, 3000);
      }

      function cancelSearch() {
        clearInterval(searchInterval);
        showScreen("game-select-screen");
      }

      async function startOnlineGame(gameId, role, opponent) {
        config.mode = "online";
        showScreen("game-screen");
        resetGameState();

        myRole = role;
        document.getElementById("player-x").querySelector(".p-name").innerText =
          role === "X" ? currentUser : opponent;
        document.getElementById("player-o").querySelector(".p-name").innerText =
          role === "O" ? currentUser : opponent;

        updateUI();
        // In Mock Mode, "Online" just plays locally but logs stats.
        // In Real Mode, you would start a sync loop here.
      }

      // ================= CORE GAME LOGIC =================
      function startGame(mode) {
        config.mode = mode;
        showScreen("game-screen");
        resetGameState();

        document.getElementById("timer-container").style.display = "flex";
        document.getElementById("player-x").querySelector(".p-name").innerText =
          currentUser + " (X)";
        document.getElementById("player-o").querySelector(".p-name").innerText =
          "CPU (O)";
        myRole = "X";

        updateUI();
        currentPlayer = "X";
        startGlobalTimer();
      }

      function resetGameState() {
        board.fill("");
        history = { X: [], O: [] };
        inventory = { X: 3, O: 3 };
        gameActive = true;
        selectedPieceIndex = null;
        messageEl.style.color = "var(--ui-dim)";
        messageEl.innerText = "Your Turn";
        clearInterval(syncInterval);

        cells.forEach((cell) => {
          cell.innerText = "";
          cell.className = "cell";
        });

        timeLeft = config.time;
        updateTimerUI();
      }

      function resetCurrentGame() {
        clearInterval(timerInterval);
        resetGameState();
        currentPlayer = "X";
        updateUI();
        if (config.mode === "cpu") startGlobalTimer();
      }

      function backFromGame() {
        clearInterval(timerInterval);
        clearInterval(syncInterval);
        showScreen("game-select-screen");
      }

      function handleCellClick(e) {
        const index = parseInt(e.target.getAttribute("data-index"));
        let isMyTurn = currentPlayer === myRole; // Works for both CPU (X) and Online

        if (!gameActive || !isMyTurn) return;

        let moveMade = false;
        if (config.gameType === "fifo") {
          moveMade = handleFifoClick(index);
        } else {
          moveMade = handleSlideClick(index);
        }

        // If playing online, we could send the move to API here
        // if(moveMade && config.mode === 'online') sendOnlineMove();
      }

      function handleFifoClick(index) {
        if (board[index] !== "") return false;
        performFifoMove(index, currentPlayer);
        if (checkWin(currentPlayer)) {
          handleGameEnd(currentPlayer);
          return true;
        }
        switchTurn();
        return true;
      }

      function handleSlideClick(index) {
        if (inventory[currentPlayer] > 0) {
          if (board[index] !== "") return false;
          placePiece(index, currentPlayer);
          inventory[currentPlayer]--;
          history[currentPlayer].push(index);
          if (checkWin(currentPlayer)) {
            handleGameEnd(currentPlayer);
            return true;
          }
          switchTurn();
          return true;
        } else {
          if (board[index] === currentPlayer) {
            clearSelection();
            selectedPieceIndex = index;
            cells[index].classList.add("selected-piece");
            highlightMoves(index);
            messageEl.innerText = "Select adjacent empty spot";
            return false;
          } else if (selectedPieceIndex !== null && board[index] === "") {
            if (isNeighbor(selectedPieceIndex, index)) {
              removePiece(selectedPieceIndex);
              placePiece(index, currentPlayer);
              const histIdx =
                history[currentPlayer].indexOf(selectedPieceIndex);
              if (histIdx > -1) history[currentPlayer].splice(histIdx, 1);
              history[currentPlayer].push(index);
              clearSelection();
              if (checkWin(currentPlayer)) {
                handleGameEnd(currentPlayer);
                return true;
              }
              switchTurn();
              return true;
            }
          }
        }
        return false;
      }

      function performFifoMove(index, player) {
        if (inventory[player] > 0) {
          placePiece(index, player);
          inventory[player]--;
          history[player].push(index);
        } else {
          let removedIndex;
          let isCpu = config.mode === "cpu" && player !== myRole;
          if (isCpu && config.difficulty === "hard")
            removedIndex = history[player].shift();
          else if (isCpu && config.difficulty === "mid")
            removedIndex = history[player].splice(1, 1)[0];
          else removedIndex = history[player].shift();

          removePiece(removedIndex);
          placePiece(index, player);
          history[player].push(index);
        }
        updateFifoHighlight();
      }

      function updateFifoHighlight() {
        if (config.gameType !== "fifo") return;
        cells.forEach((c) =>
          c.classList.remove("oldest-piece", "selected-piece", "valid-move"),
        );
        let actorRole = currentPlayer;
        let isHumanTurn = currentPlayer === myRole;

        if (
          isHumanTurn &&
          inventory[actorRole] === 0 &&
          history[actorRole].length > 0
        ) {
          const oldestIndex = history[actorRole][0];
          cells[oldestIndex].classList.add("oldest-piece");
        }
      }

      function highlightMoves(index) {
        const neighbors = getNeighbors(index);
        neighbors.forEach((n) => {
          if (board[n] === "") cells[n].classList.add("valid-move");
        });
      }
      function clearSelection() {
        selectedPieceIndex = null;
        cells.forEach((c) =>
          c.classList.remove("selected-piece", "valid-move", "oldest-piece"),
        );
      }
      function getNeighbors(i) {
        const map = {
          0: [1, 3],
          1: [0, 2, 4],
          2: [1, 5],
          3: [0, 4, 6],
          4: [1, 3, 5, 7],
          5: [2, 4, 8],
          6: [3, 7],
          7: [4, 6, 8],
          8: [5, 7],
        };
        return map[i];
      }
      function isNeighbor(from, to) {
        return getNeighbors(from).includes(to);
      }

      function placePiece(index, player) {
        board[index] = player;
        cells[index].innerText = player;
        cells[index].classList.add(player === "X" ? "x-mark" : "o-mark");
      }
      function removePiece(index) {
        board[index] = "";
        cells[index].innerText = "";
        cells[index].className = "cell";
      }
      function switchTurn() {
        currentPlayer = currentPlayer === "X" ? "O" : "X";
        updateUI();

        if (config.mode === "cpu" && currentPlayer !== myRole) {
          messageEl.innerText = "CPU Thinking...";
          setTimeout(computerMove, 600);
        } else if (config.mode === "online") {
          messageEl.innerText =
            currentPlayer === myRole ? "Your Turn" : "Opponent's Turn";
        } else {
          messageEl.innerText = "Your Turn";
        }

        if (config.gameType === "fifo") updateFifoHighlight();
      }

      // ==========================================
      // AI LOGIC (CPU)
      // ==========================================
      function computerMove() {
        if (!gameActive) return;
        const cpuRole = currentPlayer;
        const emptyIndices = board
          .map((v, i) => (v === "" ? i : null))
          .filter((v) => v !== null);

        if (config.gameType === "slide")
          computerMoveSlide(cpuRole, emptyIndices);
        else computerMoveFifo(cpuRole, emptyIndices);
      }

      function computerMoveFifo(cpuRole, emptyIndices) {
        if (inventory[cpuRole] > 0) {
          let winMove = findWinningMove(cpuRole);
          if (winMove) {
            performFifoMove(winMove, cpuRole);
            handleGameEnd(cpuRole);
            return;
          }
          let blockMove = findWinningMove(myRole);
          if (blockMove) {
            performFifoMove(blockMove, cpuRole);
            switchTurn();
            return;
          }
          performFifoMove(
            emptyIndices[Math.floor(Math.random() * emptyIndices.length)],
            cpuRole,
          );
          switchTurn();
          return;
        }

        if (config.difficulty === "hard") {
          let winMove = findBestMoveForAnyPiece(cpuRole);
          if (winMove) {
            executeCustomFifoMove(winMove.oldIndex, winMove.newIndex, cpuRole);
            handleGameEnd(cpuRole);
            return;
          }
          let blockMove = findBlockingMoveForAnyPiece(cpuRole);
          if (blockMove) {
            executeCustomFifoMove(
              blockMove.oldIndex,
              blockMove.newIndex,
              cpuRole,
            );
            switchTurn();
            return;
          }
          let rOld =
            history[cpuRole][
              Math.floor(Math.random() * history[cpuRole].length)
            ];
          let rNew =
            emptyIndices[Math.floor(Math.random() * emptyIndices.length)];
          executeCustomFifoMove(rOld, rNew, cpuRole);
          switchTurn();
          return;
        }
        if (config.difficulty === "mid" && history[cpuRole].length >= 2) {
          const piece = history[cpuRole][1];
          let winMove = findMoveForSpecificPiece(cpuRole, piece);
          if (winMove) {
            executeCustomFifoMove(piece, winMove, cpuRole);
            handleGameEnd(cpuRole);
            return;
          }
          let blockMove = findBlockForSpecificPiece(cpuRole, piece);
          if (blockMove) {
            executeCustomFifoMove(piece, blockMove, cpuRole);
            switchTurn();
            return;
          }
          let rNew =
            emptyIndices[Math.floor(Math.random() * emptyIndices.length)];
          executeCustomFifoMove(piece, rNew, cpuRole);
          switchTurn();
          return;
        }

        let winMove = findWinningMove(cpuRole);
        if (winMove) {
          performFifoMove(winMove, cpuRole);
          handleGameEnd(cpuRole);
          return;
        }
        let blockMove = findWinningMove(myRole);
        if (blockMove) {
          performFifoMove(blockMove, cpuRole);
          switchTurn();
          return;
        }
        performFifoMove(
          emptyIndices[Math.floor(Math.random() * emptyIndices.length)],
          cpuRole,
        );
        switchTurn();
      }

      function executeCustomFifoMove(removeIdx, placeIdx, player) {
        removePiece(removeIdx);
        const histIdx = history[player].indexOf(removeIdx);
        if (histIdx > -1) history[player].splice(histIdx, 1);
        placePiece(placeIdx, player);
        history[player].push(placeIdx);
        updateFifoHighlight();
      }

      function computerMoveSlide(cpuRole, emptyIndices) {
        if (inventory[cpuRole] > 0) {
          let winMove = findWinningMove(cpuRole);
          if (winMove) {
            placePiece(winMove, cpuRole);
            inventory[cpuRole]--;
            history[cpuRole].push(winMove);
            handleGameEnd(cpuRole);
            return;
          }
          let blockMove = findWinningMove(myRole);
          if (blockMove) {
            placePiece(blockMove, cpuRole);
            inventory[cpuRole]--;
            history[cpuRole].push(blockMove);
            switchTurn();
            return;
          }
          let idx =
            emptyIndices[Math.floor(Math.random() * emptyIndices.length)];
          placePiece(idx, cpuRole);
          inventory[cpuRole]--;
          history[cpuRole].push(idx);
          switchTurn();
          return;
        }
        if (history[cpuRole].length > 0) {
          let p =
            history[cpuRole][
              Math.floor(Math.random() * history[cpuRole].length)
            ];
          let neighbors = getNeighbors(p);
          let validN = neighbors.filter((n) => board[n] === "");
          if (validN.length > 0) {
            let n = validN[Math.floor(Math.random() * validN.length)];
            removePiece(p);
            placePiece(n, cpuRole);
            let hIdx = history[cpuRole].indexOf(p);
            history[cpuRole].splice(hIdx, 1);
            history[cpuRole].push(n);
          }
        }
        switchTurn();
      }

      // AI Helpers
      function findWinningMove(player) {
        const empty = board
          .map((v, i) => (v === "" ? i : null))
          .filter((v) => v !== null);
        for (let i of empty) {
          board[i] = player;
          if (checkWinOnBoard(board, player)) {
            board[i] = "";
            return i;
          }
          board[i] = "";
        }
        return null;
      }
      function findBestMoveForAnyPiece(player) {
        const myPieces = history[player];
        const empty = board
          .map((v, i) => (v === "" ? i : null))
          .filter((v) => v !== null);
        for (let old of myPieces) {
          for (let newIdx of empty) {
            board[old] = "";
            board[newIdx] = player;
            if (checkWinOnBoard(board, player)) {
              board[old] = player;
              return { oldIndex: old, newIndex: newIdx };
            }
            board[old] = player;
          }
        }
        return null;
      }
      function findBlockingMoveForAnyPiece(cpu) {
        let spot = findWinningMove(myRole);
        if (spot) return { oldIndex: history[cpu][0], newIndex: spot };
        return null;
      }
      function findMoveForSpecificPiece(player, pieceIdx) {
        const empty = board
          .map((v, i) => (v === "" ? i : null))
          .filter((v) => v !== null);
        for (let i of empty) {
          board[pieceIdx] = "";
          board[i] = player;
          if (checkWinOnBoard(board, player)) {
            board[pieceIdx] = player;
            return i;
          }
          board[pieceIdx] = player;
        }
        return null;
      }
      function findBlockForSpecificPiece(cpu, pieceIdx) {
        return findWinningMove(myRole);
      }

      // ==========================================
      // TIMER & WIN & UI
      // ==========================================
      function startGlobalTimer() {
        clearInterval(timerInterval);
        timeLeft = config.time;
        updateTimerUI();
        timerInterval = setInterval(() => {
          timeLeft--;
          updateTimerUI();
          if (timeLeft <= 0) {
            clearInterval(timerInterval);
            if (gameActive) handleGameEnd(null, "Time Up!");
          }
        }, 1000);
      }

      function updateTimerUI() {
        timerText.innerText = timeLeft;
        const percent = (timeLeft / config.time) * 100;
        timerBar.style.width = percent + "%";
        if (timeLeft <= 10) {
          timerText.classList.add("warning");
          timerBar.classList.add("warning");
        } else {
          timerText.classList.remove("warning");
          timerBar.classList.remove("warning");
        }
      }

      const winConditions = [
        [0, 1, 2],
        [3, 4, 5],
        [6, 7, 8],
        [0, 3, 6],
        [1, 4, 7],
        [2, 5, 8],
        [0, 4, 8],
        [2, 4, 6],
      ];
      function checkWin(player) {
        return checkWinOnBoard(board, player);
      }
      function checkWinOnBoard(b, player) {
        return winConditions.some((cond) => cond.every((i) => b[i] === player));
      }

      function handleGameEnd(winner, msg) {
        gameActive = false;
        clearInterval(timerInterval);
        clearInterval(syncInterval);

        if (config.mode === "cpu") {
          if (winner === myRole) {
            messageEl.innerText = "YOU WIN!";
            messageEl.style.color = "var(--accent-x)";
            updateScore("win");
          } else if (winner === null) {
            messageEl.innerText = msg;
            messageEl.style.color = "#ef4444";
          } else {
            messageEl.innerText = "CPU WINS";
            messageEl.style.color = "var(--accent-o)";
            updateScore("loss");
          }
        } else {
          if (winner === myRole) {
            messageEl.innerText = "YOU WIN!";
            updateScore("win");
          } else if (winner) {
            messageEl.innerText = "YOU LOST";
            updateScore("loss");
          } else {
            messageEl.innerText = "DRAW";
          }
          messageEl.style.color =
            winner === myRole ? "var(--accent-x)" : "#ef4444";
        }
        clearSelection();
      }

      function updateUI() {
        document.getElementById("count-x").innerText =
          `Hand: ${inventory["X"]}`;
        document.getElementById("count-o").innerText =
          `Hand: ${inventory["O"]}`;
        document
          .getElementById("player-x")
          .classList.toggle("active", currentPlayer === "X");
        document
          .getElementById("player-o")
          .classList.toggle("active", currentPlayer === "O");
        if (config.gameType === "fifo") updateFifoHighlight();
      }

      // INIT
      cells.forEach((cell) => cell.addEventListener("click", handleCellClick));
      window.onload = checkSession;
    </script>
  </body>
</html>
